<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Shift — Play</title>
<link rel="stylesheet" href="css/tokens.css">
</head>
<body class="game-page">

<!-- Intro -->
<div id="intro-screen" class="game-screen visible" style="text-align:center;">
  <div>
    <h1 id="intro-title">Dark Shift</h1>
    <p class="sub" id="intro-desc">Autonomous Bike Factory. Survive 5 minutes of chaos.</p>
    <button class="btn btn-primary" onclick="startGame()">Start Night Shift</button>
  </div>
</div>

<!-- Game Over -->
<div id="gameover-screen" class="game-screen" style="text-align:center;">
  <div>
    <h1>Shift Complete</h1>
    <div class="final-grade" id="final-grade">A+</div>
    <p style="color:var(--fg-m); margin-bottom:8px;" id="final-title">Factory Lord</p>
    <div class="final-stats" id="final-stats"></div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;">
      <button class="btn btn-primary" onclick="startGame()">Play Again</button>
      <button class="btn btn-secondary" onclick="shareScore()">Copy Score</button>
    </div>
  </div>
</div>

<!-- Main Game -->
<div id="app" style="display:none;">

  <!-- Header Bar -->
  <div id="game-header">
    <div class="left">
      <span><span class="dot dot-green"></span> <span id="hud-online">9</span></span>
      <span><span class="dot dot-yellow"></span> <span id="hud-warning">0</span></span>
      <span><span class="dot dot-red"></span> <span id="hud-down">0</span></span>
      <button class="btn btn-sm btn-secondary" onclick="drawChaosCard()">Draw Card</button>
      <button class="btn btn-sm btn-secondary" onclick="toggleMesh()">Mesh</button>
      <button class="btn btn-sm btn-secondary" onclick="toggleLog()">Log</button>
    </div>
    <span class="timer" id="timer-display">05:00</span>
  </div>

  <!-- Factory Canvas -->
  <div id="factory-area">
    <canvas id="factory-canvas"></canvas>
  </div>

  <!-- Right Panel -->
  <div id="right-panel">
    <div class="panel-section">
      <div class="panel-label">Chaos Event</div>
      <div id="chaos-card-slot">
        <p style="color:var(--fg-d); font-size:0.8125rem; padding:16px 0; text-align:center;">No active event</p>
      </div>
    </div>

    <div class="panel-section" id="proposals-section" style="display:none;">
      <div class="panel-label">Agent Proposals</div>
      <div id="proposals-slot"></div>
      <div style="display:flex; gap:6px; margin-top:8px;">
        <button class="btn btn-sm btn-primary" onclick="approveAll()">Approve All</button>
        <button class="btn btn-sm btn-secondary" onclick="dismissProposals()">Dismiss</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Priority</div>
      <div class="priority-grid">
        <button class="priority-btn active" data-mode="speed" onclick="setPriority('speed')">Speed</button>
        <button class="priority-btn" data-mode="margin" onclick="setPriority('margin')">Margin</button>
        <button class="priority-btn" data-mode="quality" onclick="setPriority('quality')">Quality</button>
        <button class="priority-btn" data-mode="green" onclick="setPriority('green')">Green</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Deck</div>
      <p style="font-size:0.8125rem; color:var(--fg-m);"><span id="deck-count">12</span> cards remaining</p>
    </div>
  </div>

  <!-- KPI Bar -->
  <div id="dashboard">
    <div class="kpi"><span class="kpi-label" id="kpi-unit-label">Produced</span><span class="kpi-value" id="kpi-units">0</span></div>
    <div class="kpi-sep"></div>
    <div class="kpi"><span class="kpi-label">OTIF</span><span class="kpi-value" id="kpi-otif">100</span></div>
    <div class="kpi-sep"></div>
    <div class="kpi"><span class="kpi-label">Margin</span><span class="kpi-value" id="kpi-margin">$0</span></div>
    <div class="kpi-sep"></div>
    <div class="kpi"><span class="kpi-label">Defects</span><span class="kpi-value" id="kpi-defect">0.5%</span></div>
    <div class="kpi-sep"></div>
    <div class="kpi"><span class="kpi-label">kWh/unit</span><span class="kpi-value" id="kpi-energy">12.0</span></div>
    <div class="kpi-sep"></div>
    <div class="kpi"><span class="kpi-label">CO2/unit</span><span class="kpi-value" id="kpi-carbon">3.2</span></div>
    <div class="kpi-sep"></div>
    <div style="flex:1;"></div>
    <div class="kpi" style="text-align:right;">
      <span class="kpi-label">Score</span>
      <span class="kpi-value" id="kpi-score" style="color:var(--accent);">0</span>
    </div>
  </div>
</div>

<!-- Event Log -->
<div id="event-log">
  <div class="log-header">Events <button onclick="toggleLog()" style="background:none;border:none;color:var(--fg-d);cursor:pointer;">x</button></div>
  <div class="log-body" id="log-body"></div>
</div>

<!-- Mesh Overlay -->
<div id="mesh-overlay" onclick="if(event.target===this)toggleMesh()">
  <canvas id="mesh-canvas" width="900" height="600"></canvas>
</div>

<!-- Bootstrap -->
<script type="module">
  import scenario from './js/scenarios/bikes.js';
  import { loadScenario } from './js/engine.js';
  import { initUI } from './js/ui.js';
  loadScenario(scenario);
  document.getElementById('intro-desc').textContent = scenario.name + '. Survive ' + Math.floor(scenario.gameDuration / 60) + ' minutes of chaos.';
  initUI();
</script>
</body>
</html>
